spring:
  application:
    name: smart-campus-api

  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]

  data:
    mongodb:
      uri: ${MONGODB_URI}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

server:
  port: 8080

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  oauth2:
    redirect-uri: ${app.frontend-url}/oauth2/redirect
    pending-redirect-uri: ${app.frontend-url}/pending-approval
  file:
    upload-dir: ./uploads
    max-attachments-per-ticket: 3
    allowed-types: image/jpeg,image/png,image/gif,image/webp

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method

logging:
  level:
    com.smartcampus: DEBUG
    org.springframework.security: DEBUG
